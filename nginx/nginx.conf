# ============================================================
# 政治 / 思政刷题系统 — Nginx 安全配置
# ============================================================

upstream backend {
    server 127.0.0.1:3000;
}

upstream frontend {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # SSL 证书配置
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ============ 安全响应头 ============
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # 关闭 server_tokens
    server_tokens off;

    # 全局限制
    client_max_body_size 10M;

    # ============ API 代理 ============
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API 全局限流
        limit_req zone=api_limit burst=30 nodelay;

        # 登录接口限流（10 req/min）
        location /api/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://backend;
        }

        # 注册接口限流（5 req/min）
        location /api/auth/register {
            limit_req zone=register_limit burst=3 nodelay;
            proxy_pass http://backend;
        }

        # AI 解析限流
        location /api/questions/ {
            limit_req zone=ai_limit burst=10 nodelay;
            proxy_pass http://backend;
        }
    }

    # ============ 前端静态资源 ============
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存
    location /_next/static/ {
        proxy_pass http://frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        return 404;
    }
}

# ============ 限流区域定义 ============
# 需要在 http 块中定义：
#
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
# limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
# limit_req_zone $binary_remote_addr zone=register_limit:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=20r/m;
